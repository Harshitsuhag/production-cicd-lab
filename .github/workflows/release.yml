name: Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      # 1️⃣ Checkout with full history (important for tags)
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2️⃣ Read and increment version safely
      - name: Increment version
        run: |
          VERSION=$(tr -d '\r\n' < version.txt)
          echo "Current version: $VERSION"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "$NEW_VERSION" > version.txt
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      # 3️⃣ Commit version update
      - name: Commit version update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add version.txt
          git commit -m "Update version to $NEW_VERSION [skip ci]" || echo "No changes"
          git push origin main

      # 4️⃣ Create tag safely
      - name: Create Git tag
        run: |
          git tag -a v$NEW_VERSION -m "Release v$NEW_VERSION"
          git push origin v$NEW_VERSION

      # 5️⃣ Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: Release v${{ env.NEW_VERSION }}
          body: |
            🚀 Production Release
            Version: v${{ env.NEW_VERSION }}
            Deployed via GitHub Actions