name: Release Pipeline

on:
  push:
    branches:
      - main

# 🔐 VERY IMPORTANT (fixes 403 error)
permissions:
  contents: write

jobs:
  version-and-release:
    runs-on: ubuntu-latest

    # 🔒 Production Approval Gate
    environment:
      name: production

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Read current version
      - name: Read current version
        id: get_version
        run: |
          VERSION=$(cat version.txt)
          echo "Current version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 3️⃣ Generate new version (Patch increment)
      - name: Increment version
        id: increment_version
        run: |
          VERSION=$(cat version.txt)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo $NEW_VERSION > version.txt
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # 4️⃣ Commit updated version.txt
      - name: Commit version update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add version.txt
          git commit -m "Update version to ${{ steps.increment_version.outputs.new_version }}"
          git push origin main

      # 5️⃣ Create Git Tag
      - name: Create Git Tag
        run: |
          git tag v${{ steps.increment_version.outputs.new_version }}
          git push origin v${{ steps.increment_version.outputs.new_version }}

      # 6️⃣ Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.increment_version.outputs.new_version }}
          name: Release v${{ steps.increment_version.outputs.new_version }}
          body: |
            🚀 Production Release
            Version: v${{ steps.increment_version.outputs.new_version }}
            Deployed via GitHub Actions